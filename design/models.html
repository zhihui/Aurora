<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aurora — 模型中心</title>
<link rel="stylesheet" href="shared.css" />
<style>
  /* master-detail shell: left provider list, right config panel */
  .md{flex:1;display:grid;grid-template-columns:260px 1fr;gap:0;overflow:hidden;padding-top:6px}
  .md .list-col{border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden}
  .md .list-col .bar{display:flex;align-items:center;gap:8px;padding:8px 12px}
  .md .list-col .bar .search{flex:1;min-width:0}
  .md .list-col .bar .search input{padding:7px 11px 7px 30px}
  .md .list-col .add{flex:none;width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--bg);display:grid;place-items:center;cursor:pointer}
  .md .list-col .add:hover{border-color:var(--iris-16);background:var(--iris-08)}
  .md .list-col .add svg{width:15px;height:15px;stroke:var(--iris);stroke-width:2;fill:none}
  .md .list-col .scroll{flex:1;overflow:auto;padding:4px 8px 16px}

  .pitem{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;cursor:pointer;border:1px solid transparent}
  .pitem:hover{background:rgba(0,0,0,.035)}
  .pitem.sel{background:var(--iris-08);border-color:var(--iris-16)}
  .pitem .pi-ico{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;flex:none;color:#fff;font-size:12px;font-weight:700;background:var(--iris)}
  .pitem .pi-meta{min-width:0;flex:1}
  .pitem .pi-name{font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:5px}
  .pitem .pi-name .ct{font-size:10.5px;color:var(--muted);font-weight:500}
  .pitem .pi-end{font-size:11px;color:var(--muted);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:ui-monospace,Menlo,monospace}
  .pitem .pi-key{width:7px;height:7px;border-radius:50%;flex:none;border:1px solid var(--line)}
  .pitem .pi-key.set{background:var(--ok);border-color:var(--ok)}
  .pitem .pi-key.unset{background:transparent}
  .pitem.empty{color:var(--muted);justify-content:center;font-size:12px;padding:18px 10px;cursor:default}
  .pitem.empty:hover{background:transparent}

  /* right detail panel */
  .md .detail{overflow:auto;padding:18px 26px 40px}
  .dhead{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .dhead .dico{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;flex:none;color:#fff;font-size:17px;font-weight:700;background:var(--iris)}
  .dhead .dname{font-size:19px;font-weight:680;letter-spacing:-.01em;display:flex;align-items:center;gap:10px}
  .dhead .did{font-size:11px;font-weight:600;color:var(--iris);background:var(--iris-08);border:1px solid var(--iris-16);border-radius:6px;padding:2px 8px;font-family:ui-monospace,Menlo,monospace}
  .dhead .actions{margin-left:auto;display:flex;gap:6px}
  .dhead a.site{font-size:11.5px;color:var(--muted);display:inline-flex;align-items:center;gap:4px;text-decoration:none}
  .dhead a.site:hover{color:var(--iris)}
  .dhead a.site svg{width:12px;height:12px;stroke:currentColor;stroke-width:1.8;fill:none}

  .dsec{font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);padding:22px 2px 9px}
  .field{display:flex;flex-direction:column;gap:5px}
  .field > label{font-size:11.5px;font-weight:500;color:var(--muted)}
  .field .row{display:flex;align-items:center;gap:8px}
  .field input{width:100%;padding:8px 11px;border:1px solid var(--line);border-radius:8px;background:var(--bg);color:var(--ink);font-size:13px;font-family:inherit}
  .field input.mono{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:12.5px}
  .field input:focus{outline:2px solid var(--iris-16);border-color:var(--iris)}
  .field .hint{font-size:11px;color:var(--muted)}
  .field .keystat{font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;display:inline-flex;align-items:center;gap:5px}
  .field .keystat.set{color:var(--ok);background:rgba(31,157,107,.08)}
  .field .keystat.unset{color:var(--muted);background:var(--bg);border:1px solid var(--line)}
  .field .keystat i{width:6px;height:6px;border-radius:50%;display:inline-block}
  .field .keystat.set i{background:var(--ok)} .field .keystat.unset i{background:var(--muted)}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

  .model{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--line);border-radius:8px;background:var(--bg);margin-bottom:6px}
  .model .mid{font-size:12.5px;font-weight:600;font-family:ui-monospace,Menlo,monospace}
  .model .mname{font-size:12px;color:var(--muted)}
  .model .rm{margin-left:auto;width:26px;height:26px;border-radius:6px;border:1px solid transparent;background:transparent;display:grid;place-items:center;cursor:pointer;color:var(--muted)}
  .model .rm:hover{color:var(--danger);background:rgba(214,69,69,.06)}
  .model .rm svg{width:14px;height:14px;stroke:currentColor;stroke-width:1.8;fill:none}
  .add-model{font-size:11.5px;font-weight:550;color:var(--iris);border:1px dashed var(--iris-16);border-radius:8px;padding:7px 12px;cursor:pointer;background:transparent;display:inline-flex;align-items:center;gap:5px}
  .add-model:hover{background:var(--iris-08)}
  .add-model svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none}

  .save-row{display:flex;align-items:center;gap:10px;padding-top:14px}
  .save-row .dirty{font-size:11px;color:var(--muted)}
  .save-row .spacer{flex:1}

  .detail-empty{display:grid;place-items:center;height:100%;text-align:center;color:var(--muted)}
  .detail-empty .b{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:4px}
  .detail-empty .s{font-size:12.5px}

  @media(max-width:820px){
    .md{grid-template-columns:1fr}
    .md .list-col{max-height:220px}
    .md .list-col{border-right:none;border-bottom:1px solid var(--line)}
  }
</style>
</head>
<body>
  <div class="titlebar"></div>
  <div class="traffic"><i class="r"></i><i class="y"></i><i class="g"></i></div>

  <div class="window">

      <div class="brand"><div class="glyph"><span></span></div><b>Aurora</b></div>
      <nav>
        <a class="nav-item" href="mockup.html">

        <a class="nav-item" href="agent-skills.html">

        <a class="nav-item active" href="models.html">

          <span class="txt">模型中心</span>
        </a>
        <a class="nav-item" href="settings.html">

          <span class="txt">设置</span>

    <main class="content">
      <div class="topbar">
        <h1>模型中心</h1>
        <p>集中管理各模型 provider 及其模型 · 定义存于 <span class="mono">~/.aurora/config.json</span> · 密钥只保存不显示</p>
      </div>

      <div class="md">
        <!-- LEFT: provider list -->
        <div class="list-col">
          <div class="bar">
            <div class="search">
              <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
              <input placeholder="搜索 provider…" />
            </div>
            <button class="add" title="新建 Provider"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
          </div>
          <div class="scroll">
            <div class="pitem sel">
              <div class="pi-ico" style="background:#10A37F">OA</div>
              <div class="pi-meta">
                <div class="pi-name">OpenAI <span class="ct">2</span></div>
                <div class="pi-end">OpenAI · Claude</div>
              </div>
              <span class="pi-key set" title="密钥已保存"></span>
            </div>
            <div class="pitem">
              <div class="pi-ico" style="background:#4D6BFE">DS</div>
              <div class="pi-meta">
                <div class="pi-name">DeepSeek <span class="ct">1</span></div>
                <div class="pi-end">OpenAI</div>
              </div>
              <span class="pi-key set" title="密钥已保存"></span>
            </div>
            <div class="pitem">
              <div class="pi-ico" style="background:#6366F1">Ki</div>
              <div class="pi-meta">
                <div class="pi-name">Moonshot <span class="ct">0</span></div>
                <div class="pi-end">OpenAI</div>
              </div>
              <span class="pi-key unset" title="尚未保存密钥"></span>
            </div>
          </div>
        </div>

        <!-- RIGHT: selected provider detail -->
        <div class="detail">
          <div class="dhead">
            <div class="dico" style="background:#10A37F">OA</div>
            <div>
              <div class="dname">OpenAI <span class="did">openai</span></div>
              <a class="site" href="#" title="官网"><svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.5.5l3-3a5 5 0 0 0-7-7l-1.7 1.7"/><path d="M14 11a5 5 0 0 0-7.5-.5l-3 3a5 5 0 0 0 7 7l1.7-1.7"/></svg>openai.com</a>
            </div>
            <div class="actions">
              <button class="icon-btn" title="编辑标识/名称"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></button>
              <button class="icon-btn danger" title="移除 Provider"><svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg></button>
            </div>
          </div>

          <div class="dsec">连接配置</div>
          <div class="grid2">
            <div class="field">
              <label>名称</label>
              <input value="OpenAI" />
            </div>
            <div class="field">
              <label>英文标识</label>
              <input value="openai" class="mono" />
              <span class="hint">唯一标识，仅限小写字母 / 数字 / - _</span>
            </div>
            <div class="field">
              <label>OpenAI 兼容端点</label>
              <input value="https://api.openai.com/v1" class="mono" />
            </div>
            <div class="field">
              <label>Claude 兼容端点</label>
              <input value="" placeholder="未配置" class="mono" />
            </div>
            <div class="field">
              <label>官网 URL（可选）</label>
              <input value="https://openai.com" class="mono" />
            </div>
          </div>

          <div class="field" style="margin-top:14px;max-width:none">
            <label>API 密钥 <span style="color:var(--muted);font-weight:400">仅可保存，不可查看 · 留空保持原密钥不变</span></label>
            <div class="row">
              <input type="password" placeholder="sk-…" class="mono" style="flex:1" />
              <span class="keystat set"><i></i>密钥已保存</span>
            </div>
          </div>

          <div class="save-row">
            <span class="dirty">有未保存的更改</span>
            <div class="spacer"></div>
            <button class="btn">放弃</button>
            <button class="btn primary">保存配置</button>
          </div>

          <div class="dsec">模型 <span style="text-transform:none;letter-spacing:0;font-weight:500;color:var(--muted)">· 2 个</span></div>
          <div>
            <div class="model">
              <span class="mid">gpt-4o-mini</span>
              <span class="mname">GPT-4o mini</span>
              <button class="rm" title="移除模型"><svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg></button>
            </div>
            <div class="model">
              <span class="mid">gpt-4o</span>
              <span class="mname">GPT-4o</span>
              <button class="rm" title="移除模型"><svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg></button>
            </div>
            <button class="add-model"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>添加模型</button>
          </div>
        </div>

        <!-- empty-state variant (shown when no provider selected) -->

        <div class="detail">
          <div class="detail-empty">
            <div>

            </div>
          </div>
        </div>
        -->

    </main>
  </div>
