name: release

# Trigger on version tags (v0.1.0) or manual run from the Actions tab.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Cancel superseded runs on the same tag.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS: build both Apple Silicon and Intel, merged into one universal .dmg later.
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ matrix.platform }}-${{ matrix.target }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.platform }}-${{ matrix.target }}-

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      # The repo's .npmrc points at a China mirror; on GitHub runners the
      # default registry is faster and more reliable.
      - name: Disable npm mirror
        run: pnpm config set registry https://registry.npmjs.org/

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & bundle (no release upload)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # When triggered by a tag, publish artifacts to that GitHub Release.
          # When run manually, they're attached to the workflow run instead.
          tagName: ${{ github.ref_name }}
          releaseName: "Aurora ${{ github.ref_name }}"
          releaseBody: "See the assets below to download the build for your platform."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
